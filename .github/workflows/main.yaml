name: main
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  merge_group:
env:
  CARGO_TERM_COLOR: always
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: nixbuild/nix-quick-install-action@v34
      - name: cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-pre-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
      - name: pre-commit
        shell: 'nix develop -c bash -e {0}'
        run: hk run pre-commit --all -j 10
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            suffix: ''
            build: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
            build: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ''
            build: 'sudo apt-get install -yqqq musl-tools'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
            build: ''
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: ''
            build: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            build: ''
    steps:
      - uses: actions/checkout@main
      - name: Cache
        uses: actions/cache@main
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: build
        run: |
          ${{ matrix.build }}
          rustup target add ${{ matrix.target }}
          cargo test --workspace --target ${{ matrix.target }}
          cargo build --target ${{ matrix.target }} --release --workspace
      - name: Archive release artifacts bin
        uses: actions/upload-artifact@main
        with:
          name: mod_installer-${{ matrix.target }}${{ matrix.suffix }}
          path: ./target/${{ matrix.target }}/release/mod_installer${{ matrix.suffix }}
          if-no-files-found: error
  build-nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: nixbuild/nix-quick-install-action@v34
      - name: cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
      - run: nix build
      - name: Archive release artifacts
        uses: actions/upload-artifact@main
        with:
          name: mod_installer-nix
          path: ./result/bin/mod_installer
          if-no-files-found: error
  release:
    needs: [build, build-nix, pre-commit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag_name: ${{ steps.get_tag.outputs.git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
      - name: Get the tag
        id: get_tag
        run: echo ::set-output name=git_tag::${GITHUB_REF/refs\/tags\//}
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@main
        with:
          generateReleaseNotes: true
          prerelease: ${{ startsWith(steps.get_tag.outputs.git_tag, 'nightly') }}
  upload:
    needs: [release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            suffix: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@main
        with:
          name: mod_installer-${{ matrix.target }}${{ matrix.suffix }}
      - name: Upload Release Asset - ${{ matrix.os }} bin
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./mod_installer${{ matrix.suffix }}
          asset_name: mod_installer-${{ matrix.target }}${{ matrix.suffix }}
          asset_content_type: application/octet-stream
